<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>剑道试炼 · 程序设计实践题解集</title>
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>
  /* ===== 剑道试炼 · 深墨绿江湖主题 ===== */
  :root {
    /* 背景系统 */
    --bg-page: #0a0f0a;
    --bg-sidebar: #0d120d;
    --bg-card: #161c16;
    --bg-code: #0a0f0a;
    /* 颜色系统 */
    --red: #a03030;
    --red-light: #c44242;
    --red-dark: #802020;
    --green: #4a9a4a;
    --green-light: #8aca8a;
    --green-dark: #2a4a2a;
    /* 边框 */
    --border-default: #2a3a2a;
    --border-accent: #4a9a4a;
    /* 文字 */
    --text-primary: #e8f0e8;
    --text-secondary: #b8c0b8;
    --text-muted: #6a7a6a;
    --sidebar-hover: rgba(74, 154, 74, 0.08);
  }

  body {
    font-family: "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(74, 154, 74, 0.04) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(160, 48, 48, 0.04) 0%, transparent 55%);
  }

  /* ===== 侧边栏 ===== */
  .sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-default);
    width: 280px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }

  .sidebar-nav {
    padding: 0 0 20px 0;
  }
  .sidebar-nav li {
    margin: 0;
    list-style: none;
  }
  .sidebar-nav a {
    display: block;
    padding: 8px 20px 8px 24px;
    font-size: 13px;
    color: var(--text-muted);
    border-left: 3px solid transparent;
    transition: all 0.15s ease;
    text-decoration: none;
    line-height: 1.5;
  }
  .sidebar-nav a:hover {
    background: var(--sidebar-hover);
    border-left-color: var(--green);
    color: var(--text-primary);
  }
  .sidebar-nav a.active {
    background: var(--sidebar-hover);
    border-left-color: var(--green);
    color: var(--text-primary);
    font-weight: 600;
  }

  .sidebar > h1 {
    margin: 0;
    padding: 20px 20px 12px;
    font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border-default);
  }
  .sidebar > h1 a {
    color: var(--text-primary);
    text-decoration: none;
  }
  .sidebar > h1 a:hover {
    color: var(--green-light);
  }

  /* ===== 搜索框 ===== */
  .search {
    border-bottom: 1px solid var(--border-default);
    padding: 12px 16px;
  }
  .search input {
    border: 1px solid var(--border-default);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    background: var(--bg-code);
    color: var(--text-primary);
    transition: border-color 0.2s;
  }
  .search input::placeholder {
    color: var(--text-muted);
  }
  .search input:focus {
    border-color: var(--green);
    outline: none;
  }

  /* ===== 搜索结果 ===== */
  .search .results-panel {
    margin-top: 4px;
  }
  .search .results-panel .matching-post {
    cursor: pointer;
    padding: 6px 10px;
    margin: 2px 0;
    border-radius: 4px;
    transition: all 0.15s ease;
    border-left: 3px solid transparent;
  }
  .search .results-panel .matching-post:hover {
    background: var(--sidebar-hover);
    border-left-color: var(--green);
  }
  .search .results-panel .matching-post a {
    color: var(--text-primary);
    font-weight: 600;
    text-decoration: none;
    display: block;
  }
  .search .results-panel .matching-post a:hover {
    color: var(--green-light);
  }
  .search .results-panel .matching-post em.search-keyword {
    color: var(--text-primary);
    background: rgba(74, 154, 74, 0.25);
    padding: 0 3px;
    border-radius: 2px;
    font-weight: 600;
    font-style: normal;
  }

  /* ===== 主内容区 ===== */
  .content {
    padding-top: 30px;
  }
  .markdown-section {
    max-width: 900px;
    padding: 20px 40px 60px;
  }

  /* ===== h1 主标题 ===== */
  .markdown-section h1 {
    font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--text-primary);
    padding: 20px 28px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #1a2a1a 0%, #2a1a1a 100%);
    border: 1px solid var(--border-default);
    border-radius: 16px;
    letter-spacing: 0.08em;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .markdown-section h1 + blockquote {
    margin-top: 0;
  }

  /* ===== h2 题目标题 ===== */
  .markdown-section h2 {
    font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    padding: 14px 20px;
    margin: 32px 0 0 0;
    background: var(--bg-card);
    border-radius: 12px 12px 0 0;
    border-left: 4px solid var(--red);
  }
  .markdown-section h2 + p {
    margin-top: 0;
  }

  /* ===== 列表 ===== */
  .markdown-section ul li {
    margin: 6px 0;
    color: var(--text-secondary);
  }
  .markdown-section ul li strong:first-child {
    color: var(--green-light);
  }

  /* ===== h2后面的考点段落 ===== */
  .markdown-section h2 + p {
    margin: 8px 0 0 0;
    padding: 8px 20px;
    background: var(--bg-card);
    border-radius: 0 0 12px 12px;
    border-left: 4px solid var(--green);
    color: var(--text-secondary);
  }

  /* ===== 代码块 ===== */
  .markdown-section pre {
    background: var(--bg-code);
    border-radius: 12px;
    padding: 16px 20px;
    border: 1px solid var(--border-default);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .markdown-section code {
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .markdown-section pre code {
    background: none;
    color: var(--text-secondary);
  }
  .markdown-section p code, .markdown-section li code {
    background: var(--bg-card);
    color: var(--green-light);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12.5px;
    border: 1px solid var(--border-default);
  }

  /* ===== 分隔线 ===== */
  .markdown-section hr {
    border: none;
    height: 1px;
    background: var(--border-default);
    margin: 36px 0;
  }

  /* ===== 引用块 ===== */
  .markdown-section blockquote {
    border-left: 4px solid var(--green);
    background: var(--bg-card);
    padding: 12px 20px;
    border-radius: 0 12px 12px 0;
    color: var(--text-secondary);
    font-size: 14px;
    margin: 16px 0;
  }

  /* ===== 图片 ===== */
  .markdown-section img {
    border-radius: 12px;
    border: 1px solid var(--border-default);
  }

  /* ===== 链接 ===== */
  .markdown-section a {
    color: var(--green-light);
    text-decoration: none;
    transition: color 0.2s;
  }
  .markdown-section a:hover {
    color: var(--text-primary);
  }

  /* ===== 响应式 ===== */
  @media (max-width: 768px) {
    .sidebar {
      width: 260px;
    }
    .markdown-section {
      padding: 15px 20px 40px;
    }
    .markdown-section h1 {
      font-size: 22px;
      padding: 16px 20px;
    }
    .markdown-section h2 {
      font-size: 17px;
      padding: 10px 14px;
    }
  }

  /* ===== 侧边栏切换按钮 ===== */
  .sidebar-toggle {
    background: var(--green);
    color: #fff;
    border-radius: 0 6px 6px 0;
  }
  .sidebar-toggle:hover {
    background: var(--green-dark);
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
window.$docsify = {
  name: '剑道试炼 · 题解集',
  repo: '',
  loadSidebar: true,
  subMaxLevel: 2,
  auto2top: true,
  search: 'auto',
  themeColor: '#4a9a4a',
  coverpage: false,
  logo: '',
  nameLink: '/',
  plugins: [
    function(hook, vm) {
      // 存储题目索引
      var problemIndex = [];
      var searchTimeout = null;

      function buildIndex() {
        problemIndex = [];
        var headings = document.querySelectorAll('.markdown-section h2[id]');
        headings.forEach(function(h2) {
          if (!h2.id) return;
          var title = h2.textContent.trim();
          // 获取考点和思路摘要
          var summary = '';
          var el = h2.nextElementSibling;
          while (el && el.tagName !== 'H2') {
            summary += el.textContent.replace(/\s+/g, ' ').trim() + ' ';
            el = el.nextElementSibling;
          }
          summary = summary.substring(0, 120);
          problemIndex.push({ id: h2.id, title: title, summary: summary });
        });
      }

      function highlightText(text, query) {
        var re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        return text.replace(re, '<em class="search-keyword">$1</em>');
      }

      function doSearch(query) {
        var panel = document.querySelector('.results-panel');
        if (!panel) return;
        var q = query.trim().toLowerCase();
        if (!q) {
          panel.classList.remove('show');
          panel.innerHTML = '';
          return;
        }
        panel.classList.add('show');
        var matches = problemIndex.filter(function(item) {
          return item.title.toLowerCase().includes(q) ||
                 item.summary.toLowerCase().includes(q);
        });
        if (matches.length === 0) {
          panel.innerHTML = '<div class="matching-post" style="padding:8px;color:var(--text-light);font-size:13px;">没有找到匹配的题目</div>';
          return;
        }
        panel.innerHTML = matches.map(function(item) {
          var hlTitle = highlightText(item.title, q);
          var hlSummary = highlightText(item.summary, q);
          return '<div class="matching-post" data-link="' + item.id + '">' +
            '<a href="#/README?id=' + item.id + '">' +
            hlTitle +
            '<p style="font-size:12px;color:var(--text-light);margin:2px 0 0;font-weight:normal;">' +
            hlSummary.substring(0, 100) + '</p>' +
            '</a>' +
            '</div>';
        }).join('');
        // 绑定点击跳转：点击整个条目区域触发跳转
        panel.querySelectorAll('.matching-post').forEach(function(post) {
          post.addEventListener('click', function(e) {
            if (e.target.tagName === 'A') return;
            var link = post.querySelector('a');
            if (link) {
              var href = link.getAttribute('href');
              if (href) {
                window.location.hash = href.replace(/^.*#/, '#');
              }
            }
          });
        });
      }

      // 每次页面渲染完后重建索引，绑定搜索输入
      hook.doneEach(function() {
        buildIndex();
        var input = document.querySelector('.search input');
        if (input) {
          // 移除旧监听器（用新函数替换）
          var handler = input._searchHandler;
          if (handler) input.removeEventListener('input', handler);
          var newHandler = function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() {
              doSearch(input.value);
            }, 150);
          };
          input._searchHandler = newHandler;
          input.addEventListener('input', newHandler);
          // 如果已经有值，触发搜索
          if (input.value) doSearch(input.value);
        }
      });
    }
  ]
};
</script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
