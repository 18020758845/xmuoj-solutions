<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>泰拉风 · 题解集</title>
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>
  /* ===== 手绘像素风 · 温暖治愈 ===== */
  :root {
    --wood: #8b5a3c;
    --wood-light: #a67c52;
    --wood-dark: #5c3820;
    --roof: #5d2e4a;
    --roof-light: #7a4a62;
    --gold: #e8a838;
    --gold-light: #f0c860;
    --grass: #9ca840;
    --grass-dark: #6b7830;
    --teal: #4ecdc4;
    --teal-dark: #389e98;
    --bg: #f5e6c8;
    --card-bg: #fef9ed;
    --text: #4a3020;
    --text-light: #6b5a40;
    --outline: #2a1f1a;
    --outline-light: #4a3728;
    --code-bg: #3d4a2a;
    --code-text: #f5e6c8;
    --sidebar-bg: #fef9ed;
    --sidebar-hover: #fef3d8;
    --shadow-hard: 4px 4px 0 #2a1f1a;
    --shadow-soft: 6px 6px 0 rgba(42, 31, 26, 0.15);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(232, 168, 56, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(156, 168, 64, 0.06) 0%, transparent 50%);
  }

  /* ===== 侧边栏 - 木质面板 ===== */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 3px solid var(--outline);
    width: 280px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--wood-light); border-radius: 4px; }

  .sidebar-nav {
    padding: 0 0 20px 0;
  }
  .sidebar-nav li {
    margin: 2px 8px;
    list-style: none;
  }
  .sidebar-nav a {
    display: block;
    padding: 8px 14px;
    font-size: 13.5px;
    color: var(--text-light);
    border: 2px solid transparent;
    border-radius: 8px;
    transition: all 0.15s ease;
    text-decoration: none;
    line-height: 1.6;
  }
  .sidebar-nav a:hover {
    background: var(--sidebar-hover);
    border-color: var(--gold);
    color: var(--wood-dark);
  }
  .sidebar-nav a.active {
    background: var(--sidebar-hover);
    border-color: var(--gold);
    color: var(--wood-dark);
    font-weight: 700;
  }

  .sidebar > h1 {
    margin: 0;
    padding: 18px 20px 12px;
    font-size: 17px;
    font-weight: 700;
    color: #fef9ed;
    background: var(--roof);
    border-bottom: 3px solid var(--outline);
  }
  .sidebar > h1 a {
    color: #fef9ed;
    text-decoration: none;
  }
  .sidebar > h1 a:hover {
    color: var(--gold-light);
  }

  /* ===== 搜索框 ===== */
  .search {
    border-bottom: 2px solid var(--outline);
    padding: 12px 16px;
    background: var(--card-bg);
  }
  .search input {
    border: 2px solid var(--outline);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    transition: all 0.15s;
  }
  .search input::placeholder {
    color: var(--text-light);
  }
  .search input:focus {
    border-color: var(--gold);
    box-shadow: 3px 3px 0 var(--outline);
    outline: none;
  }

  /* ===== 搜索结果 ===== */
  .search .results-panel {
    margin-top: 4px;
  }
  .search .results-panel .matching-post {
    cursor: pointer;
    padding: 6px 10px;
    margin: 2px 0;
    border-radius: 6px;
    transition: all 0.15s ease;
    border: 2px solid transparent;
  }
  .search .results-panel .matching-post:hover {
    background: var(--sidebar-hover);
    border-color: var(--gold);
  }
  .search .results-panel .matching-post a {
    color: var(--text);
    font-weight: 600;
    text-decoration: none;
    display: block;
  }
  .search .results-panel .matching-post a:hover {
    color: var(--wood-dark);
  }
  .search .results-panel .matching-post em.search-keyword {
    color: var(--wood-dark);
    background: rgba(232, 168, 56, 0.2);
    padding: 0 3px;
    border-radius: 3px;
    font-weight: 600;
    font-style: normal;
  }

  /* ===== 主内容区 ===== */
  .content {
    padding-top: 30px;
  }
  .markdown-section {
    max-width: 900px;
    padding: 20px 40px 60px;
  }

  /* ===== h1 主标题 ===== */
  .markdown-section h1 {
    font-size: 28px;
    font-weight: 800;
    color: #fef9ed;
    background: var(--roof);
    padding: 16px 24px;
    border: 3px solid var(--outline);
    border-radius: 16px;
    box-shadow: var(--shadow-hard);
    margin-bottom: 20px;
  }
  .markdown-section h1 + blockquote {
    margin-top: 0;
  }

  /* ===== h2 题目标题 ===== */
  .markdown-section h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--wood-dark);
    padding: 14px 18px;
    margin: 32px 0 0 0;
    background: var(--card-bg);
    border: 2px solid var(--outline);
    border-radius: 12px 12px 0 0;
    border-bottom: none;
    box-shadow: 3px 3px 0 var(--outline);
  }
  .markdown-section h2 + p {
    margin-top: 0;
  }

  .markdown-section ul li {
    margin: 6px 0;
  }
  .markdown-section ul li strong:first-child {
    color: var(--roof);
  }

  /* ===== 考点标签专用 ===== */
  .markdown-section h2 + p {
    margin: 8px 0 0 0;
    padding: 8px 18px;
    background: var(--card-bg);
    border: 2px solid var(--outline);
    border-radius: 0 0 12px 12px;
    border-top: none;
    border-left: 4px solid var(--grass);
  }

  /* ===== 代码块 - 深绿底 ===== */
  .markdown-section pre {
    background: var(--code-bg);
    border-radius: 12px;
    padding: 18px 22px;
    border: 3px solid var(--outline);
    box-shadow: 4px 4px 0 var(--outline);
    color: var(--code-text);
  }
  .markdown-section code {
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
  }
  .markdown-section pre code {
    background: none;
    color: var(--code-text);
  }
  .markdown-section p code, .markdown-section li code {
    background: var(--card-bg);
    color: var(--roof);
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 12.5px;
    border: 2px solid var(--outline);
  }

  /* ===== 分隔线 ===== */
  .markdown-section hr {
    border: none;
    height: 3px;
    background: repeating-linear-gradient(
      90deg,
      var(--gold) 0px,
      var(--gold) 12px,
      var(--outline) 12px,
      var(--outline) 16px,
      var(--grass) 16px,
      var(--grass) 28px,
      var(--outline) 28px,
      var(--outline) 32px
    );
    margin: 40px 0;
    border-radius: 2px;
  }

  /* ===== 引用块 ===== */
  .markdown-section blockquote {
    border-left: 4px solid var(--gold);
    background: var(--card-bg);
    padding: 12px 18px;
    border-radius: 0 12px 12px 0;
    border: 2px solid var(--outline);
    border-left: 4px solid var(--gold);
    color: var(--text-light);
    font-size: 14px;
    box-shadow: 3px 3px 0 var(--outline);
  }

  /* ===== 图片 ===== */
  .markdown-section img {
    border-radius: 12px;
    border: 3px solid var(--outline);
    box-shadow: 4px 4px 0 var(--outline);
  }

  /* ===== 链接 ===== */
  .markdown-section a {
    color: var(--teal-dark);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.15s;
  }
  .markdown-section a:hover {
    color: var(--roof);
  }

  /* ===== 表格 ===== */
  .markdown-section table {
    border-collapse: separate;
    border-spacing: 0;
    border: 3px solid var(--outline);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 4px 4px 0 var(--outline);
  }
  .markdown-section th {
    background: var(--wood);
    color: #fef9ed;
    padding: 10px 14px;
    border-bottom: 2px solid var(--outline);
    font-weight: 700;
  }
  .markdown-section td {
    padding: 8px 14px;
    border-bottom: 1px solid var(--outline-light);
    background: var(--card-bg);
  }
  .markdown-section tr:last-child td {
    border-bottom: none;
  }

  /* ===== 响应式 ===== */
  @media (max-width: 768px) {
    .sidebar {
      width: 260px;
    }
    .markdown-section {
      padding: 15px 20px 40px;
    }
    .markdown-section h1 {
      font-size: 22px;
      padding: 12px 16px;
    }
    .markdown-section h2 {
      font-size: 17px;
      padding: 10px 14px;
    }
  }

  /* ===== 按钮美化 ===== */
  .sidebar-toggle {
    background: var(--roof);
    color: #fff;
    border-radius: 0 8px 8px 0;
    border: 2px solid var(--outline);
    border-left: none;
  }
  .sidebar-toggle:hover {
    background: var(--roof-light);
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
window.$docsify = {
  name: '程序设计实践例题题解',
  repo: '',
  loadSidebar: true,
  subMaxLevel: 2,
  auto2top: true,
  search: 'auto',
  themeColor: '#5d2e4a',
  coverpage: false,
  logo: '',
  nameLink: '/',
  plugins: [
    function(hook, vm) {
      // 存储题目索引
      var problemIndex = [];
      var searchTimeout = null;

      function buildIndex() {
        problemIndex = [];
        var headings = document.querySelectorAll('.markdown-section h2[id]');
        headings.forEach(function(h2) {
          if (!h2.id) return;
          var title = h2.textContent.trim();
          // 获取考点和思路摘要
          var summary = '';
          var el = h2.nextElementSibling;
          while (el && el.tagName !== 'H2') {
            summary += el.textContent.replace(/\s+/g, ' ').trim() + ' ';
            el = el.nextElementSibling;
          }
          summary = summary.substring(0, 120);
          problemIndex.push({ id: h2.id, title: title, summary: summary });
        });
      }

      function highlightText(text, query) {
        var re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        return text.replace(re, '<em class="search-keyword">$1</em>');
      }

      function doSearch(query) {
        var panel = document.querySelector('.results-panel');
        if (!panel) return;
        var q = query.trim().toLowerCase();
        if (!q) {
          panel.classList.remove('show');
          panel.innerHTML = '';
          return;
        }
        panel.classList.add('show');
        var matches = problemIndex.filter(function(item) {
          return item.title.toLowerCase().includes(q) ||
                 item.summary.toLowerCase().includes(q);
        });
        if (matches.length === 0) {
          panel.innerHTML = '<div class="matching-post" style="padding:8px;color:var(--text-light);font-size:13px;">没有找到匹配的题目</div>';
          return;
        }
        panel.innerHTML = matches.map(function(item) {
          var hlTitle = highlightText(item.title, q);
          var hlSummary = highlightText(item.summary, q);
          return '<div class="matching-post" data-link="' + item.id + '">' +
            '<a href="#/README?id=' + item.id + '">' +
            hlTitle +
            '<p style="font-size:12px;color:var(--text-light);margin:2px 0 0;font-weight:normal;">' +
            hlSummary.substring(0, 100) + '</p>' +
            '</a>' +
            '</div>';
        }).join('');
        // 绑定点击跳转：点击整个条目区域触发跳转
        panel.querySelectorAll('.matching-post').forEach(function(post) {
          post.addEventListener('click', function(e) {
            if (e.target.tagName === 'A') return;
            var link = post.querySelector('a');
            if (link) {
              var href = link.getAttribute('href');
              if (href) {
                window.location.hash = href.replace(/^.*#/, '#');
              }
            }
          });
        });
      }

      // 每次页面渲染完后重建索引，绑定搜索输入
      hook.doneEach(function() {
        buildIndex();
        var input = document.querySelector('.search input');
        if (input) {
          // 移除旧监听器（用新函数替换）
          var handler = input._searchHandler;
          if (handler) input.removeEventListener('input', handler);
          var newHandler = function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() {
              doSearch(input.value);
            }, 150);
          };
          input._searchHandler = newHandler;
          input.addEventListener('input', newHandler);
          // 如果已经有值，触发搜索
          if (input.value) doSearch(input.value);
        }
      });
    }
  ]
};
</script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
