<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2026程序设计实践例题 · 题解集</title>
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>
  /* ===== 全局 ===== */
  :root {
    --primary: #6c5ce7;
    --primary-light: #a29bfe;
    --primary-dark: #4834d4;
    --accent: #fd79a8;
    --bg: #f5f2ff;
    --card-bg: rgba(255, 255, 255, 0.85);
    --text: #2d3436;
    --text-light: #636e72;
    --border: rgba(108, 92, 231, 0.12);
    --code-bg: rgba(108, 92, 231, 0.04);
    --sidebar-bg: rgba(255, 255, 255, 0.9);
    --sidebar-hover: rgba(108, 92, 231, 0.08);
    --shadow-sm: 0 2px 8px rgba(108, 92, 231, 0.06);
    --shadow-md: 0 8px 32px rgba(108, 92, 231, 0.1);
    --shadow-lg: 0 16px 48px rgba(108, 92, 231, 0.12);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ===== 侧边栏 - 毛玻璃 ===== */
  .sidebar {
    background: var(--sidebar-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    width: 280px;
    box-shadow: 4px 0 30px rgba(108, 92, 231, 0.06);
    z-index: 2;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sidebar-nav {
    padding: 0 0 20px 0;
  }
  .sidebar-nav li {
    margin: 0;
    list-style: none;
  }
  .sidebar-nav a {
    display: block;
    padding: 8px 20px 8px 24px;
    font-size: 13.5px;
    color: var(--text);
    border-left: 3px solid transparent;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
    line-height: 1.6;
  }
  .sidebar-nav a:hover {
    background: var(--sidebar-hover);
    border-left-color: var(--primary-light);
    color: var(--primary);
    transform: translateX(2px);
  }
  .sidebar-nav a.active {
    background: var(--sidebar-hover);
    border-left-color: var(--primary);
    color: var(--primary-dark);
    font-weight: 600;
  }

  .sidebar > h1 {
    margin: 0;
    padding: 20px 20px 12px;
    font-size: 17px;
    font-weight: 700;
    color: var(--primary-dark);
    border-bottom: 1px solid var(--border);
  }
  .sidebar > h1 a {
    color: var(--primary-dark);
    text-decoration: none;
  }
  .sidebar > h1 a:hover {
    color: var(--primary);
  }

  /* ===== 搜索框 ===== */
  .search {
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }
  .search input {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 14px;
    font-size: 13px;
    background: rgba(108, 92, 231, 0.04);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .search input:focus {
    border-color: var(--primary-light);
    box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1), 0 4px 16px rgba(108, 92, 231, 0.08);
    outline: none;
    background: rgba(108, 92, 231, 0.06);
  }

  /* ===== 搜索结果 ===== */
  .search .results-panel {
    margin-top: 4px;
  }
  .search .results-panel .matching-post {
    cursor: pointer;
    padding: 6px 10px;
    margin: 2px 0;
    border-radius: 8px;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
  }
  .search .results-panel .matching-post:hover {
    background: var(--sidebar-hover);
    border-left-color: var(--primary-light);
    transform: translateX(2px);
  }
  .search .results-panel .matching-post a {
    color: var(--primary-dark);
    font-weight: 600;
    text-decoration: none;
    display: block;
  }
  .search .results-panel .matching-post a:hover {
    color: var(--primary);
  }
  .search .results-panel .matching-post em.search-keyword {
    color: var(--primary);
    background: rgba(108,92,231,0.1);
    padding: 0 4px;
    border-radius: 3px;
    font-weight: 600;
    font-style: normal;
  }

  /* ===== 主内容区 ===== */
  .content {
    padding-top: 30px;
  }
  .markdown-section {
    max-width: 900px;
    padding: 20px 40px 60px;
  }

  /* ===== 标题 ===== */
  .markdown-section h1 {
    font-size: 28px;
    font-weight: 800;
    color: var(--primary-dark);
    border-bottom: 2px solid var(--primary-light);
    padding-bottom: 14px;
    margin-bottom: 20px;
    letter-spacing: 0.02em;
  }
  .markdown-section h1 + blockquote {
    margin-top: -8px;
  }
  .markdown-section h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
    padding: 14px 18px;
    margin: 32px 0 0 0;
    background: linear-gradient(135deg, rgba(108,92,231,0.07), rgba(162,155,254,0.03));
    border-radius: 12px 12px 0 0;
    border-left: 4px solid var(--primary);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.3s ease;
  }
  .markdown-section h2:hover {
    transform: translateX(3px);
    box-shadow: 0 4px 20px rgba(108, 92, 231, 0.08);
  }
  .markdown-section h2 + p {
    margin-top: 0;
  }

  /* ===== 列表 ===== */
  .markdown-section ul li {
    margin: 6px 0;
    transition: transform 0.2s ease;
  }
  .markdown-section ul li strong:first-child {
    color: var(--primary-dark);
  }

  /* ===== 考点标签专用 ===== */
  .markdown-section h2 + p {
    margin: 8px 0 0 0;
    padding: 8px 18px;
    background: linear-gradient(135deg, rgba(253,121,168,0.06), rgba(253,121,168,0.02));
    border-radius: 0 0 12px 12px;
    border-left: 4px solid var(--accent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  /* ===== 代码块 - 立体卡片 ===== */
  .markdown-section pre {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 18px 22px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md), 0 1px 0 rgba(255,255,255,0.8) inset;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .markdown-section pre:hover {
    box-shadow: var(--shadow-lg), 0 1px 0 rgba(255,255,255,0.8) inset;
    transform: translateY(-2px);
  }
  .markdown-section pre::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--primary-light), transparent);
    opacity: 0.5;
  }
  .markdown-section code {
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
  }
  .markdown-section pre code {
    background: none;
  }
  .markdown-section p code, .markdown-section li code {
    background: var(--code-bg);
    color: #e17055;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 12.5px;
    border: 1px solid var(--border);
  }

  /* ===== 分隔线 ===== */
  .markdown-section hr {
    border: none;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), var(--primary-light), var(--border), transparent);
    margin: 40px 0;
  }

  /* ===== 引用块 ===== */
  .markdown-section blockquote {
    border-left: 4px solid var(--primary-light);
    background: rgba(108,92,231,0.04);
    padding: 12px 20px;
    border-radius: 0 10px 10px 0;
    color: var(--text-light);
    font-size: 14px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  /* ===== 图片 ===== */
  .markdown-section img {
    border-radius: 12px;
    box-shadow: var(--shadow-md);
    transition: all 0.3s ease;
  }
  .markdown-section img:hover {
    box-shadow: var(--shadow-lg);
    transform: scale(1.01);
  }

  /* ===== 链接 ===== */
  .markdown-section a {
    color: var(--primary);
    text-decoration: none;
    transition: all 0.2s ease;
  }
  .markdown-section a:hover {
    color: var(--primary-dark);
  }

  /* ===== 响应式 ===== */
  @media (max-width: 768px) {
    .sidebar {
      width: 260px;
    }
    .markdown-section {
      padding: 15px 20px 40px;
    }
    .markdown-section h1 {
      font-size: 22px;
    }
    .markdown-section h2 {
      font-size: 17px;
      padding: 10px 14px;
    }
  }

  /* ===== 按钮美化 ===== */
  .sidebar-toggle {
    background: var(--primary);
    color: #fff;
    border-radius: 0 8px 8px 0;
    box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
    transition: all 0.3s ease;
  }
  .sidebar-toggle:hover {
    background: var(--primary-dark);
    box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
window.$docsify = {
  name: '程序设计实践例题题解',
  repo: '',
  loadSidebar: true,
  subMaxLevel: 2,
  auto2top: true,
  search: 'auto',
  themeColor: '#6c5ce7',
  coverpage: false,
  logo: '',
  nameLink: '/',
  plugins: [
    function(hook, vm) {
      // 存储题目索引
      var problemIndex = [];
      var searchTimeout = null;

      function buildIndex() {
        problemIndex = [];
        var headings = document.querySelectorAll('.markdown-section h2[id]');
        headings.forEach(function(h2) {
          if (!h2.id) return;
          var title = h2.textContent.trim();
          // 获取考点和思路摘要
          var summary = '';
          var el = h2.nextElementSibling;
          while (el && el.tagName !== 'H2') {
            summary += el.textContent.replace(/\s+/g, ' ').trim() + ' ';
            el = el.nextElementSibling;
          }
          summary = summary.substring(0, 120);
          problemIndex.push({ id: h2.id, title: title, summary: summary });
        });
      }

      function highlightText(text, query) {
        var re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        return text.replace(re, '<em class="search-keyword">$1</em>');
      }

      function doSearch(query) {
        var panel = document.querySelector('.results-panel');
        if (!panel) return;
        var q = query.trim().toLowerCase();
        if (!q) {
          panel.classList.remove('show');
          panel.innerHTML = '';
          return;
        }
        panel.classList.add('show');
        var matches = problemIndex.filter(function(item) {
          return item.title.toLowerCase().includes(q) ||
                 item.summary.toLowerCase().includes(q);
        });
        if (matches.length === 0) {
          panel.innerHTML = '<div class="matching-post" style="padding:8px;color:var(--text-light);font-size:13px;">没有找到匹配的题目</div>';
          return;
        }
        panel.innerHTML = matches.map(function(item) {
          var hlTitle = highlightText(item.title, q);
          var hlSummary = highlightText(item.summary, q);
          return '<div class="matching-post" data-link="' + item.id + '">' +
            '<a href="#/README?id=' + item.id + '">' +
            hlTitle +
            '<p style="font-size:12px;color:var(--text-light);margin:2px 0 0;font-weight:normal;">' +
            hlSummary.substring(0, 100) + '</p>' +
            '</a>' +
            '</div>';
        }).join('');
        // 绑定点击跳转：点击整个条目区域触发跳转
        panel.querySelectorAll('.matching-post').forEach(function(post) {
          post.addEventListener('click', function(e) {
            if (e.target.tagName === 'A') return;
            var link = post.querySelector('a');
            if (link) {
              var href = link.getAttribute('href');
              if (href) {
                window.location.hash = href.replace(/^.*#/, '#');
              }
            }
          });
        });
      }

      // 每次页面渲染完后重建索引，绑定搜索输入
      hook.doneEach(function() {
        buildIndex();
        var input = document.querySelector('.search input');
        if (input) {
          // 移除旧监听器（用新函数替换）
          var handler = input._searchHandler;
          if (handler) input.removeEventListener('input', handler);
          var newHandler = function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() {
              doSearch(input.value);
            }, 150);
          };
          input._searchHandler = newHandler;
          input.addEventListener('input', newHandler);
          // 如果已经有值，触发搜索
          if (input.value) doSearch(input.value);
        }
      });
    }
  ]
};
</script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
