<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2026程序设计实践例题 · 题解集</title>
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>
  /* ===== 全局 ===== */
  :root {
    --primary: #6c5ce7;
    --primary-light: #a29bfe;
    --primary-dark: #4834d4;
    --accent: #fd79a8;
    --bg: #f8f9fe;
    --card-bg: #ffffff;
    --text: #2d3436;
    --text-light: #636e72;
    --border: #e8e8f0;
    --code-bg: #f0f0f6;
    --sidebar-bg: #ffffff;
    --sidebar-hover: #f0eefd;
    --shadow: 0 2px 12px rgba(108, 92, 231, 0.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ===== 侧边栏 ===== */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    width: 280px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sidebar-nav {
    padding: 0 0 20px 0;
  }
  .sidebar-nav li {
    margin: 0;
    list-style: none;
  }
  .sidebar-nav a {
    display: block;
    padding: 7px 20px 7px 24px;
    font-size: 13.5px;
    color: var(--text);
    border-left: 3px solid transparent;
    transition: all 0.2s ease;
    text-decoration: none;
    line-height: 1.6;
  }
  .sidebar-nav a:hover {
    background: var(--sidebar-hover);
    border-left-color: var(--primary-light);
    color: var(--primary);
  }
  .sidebar-nav a.active {
    background: var(--sidebar-hover);
    border-left-color: var(--primary);
    color: var(--primary-dark);
    font-weight: 600;
  }

  .sidebar > h1 {
    margin: 0;
    padding: 20px 20px 12px;
    font-size: 17px;
    font-weight: 700;
    color: var(--primary-dark);
    border-bottom: 1px solid var(--border);
  }
  .sidebar > h1 a {
    color: var(--primary-dark);
    text-decoration: none;
  }
  .sidebar > h1 a:hover {
    color: var(--primary);
  }

  /* ===== 搜索框 ===== */
  .search {
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }
  .search input {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    background: var(--bg);
    transition: all 0.2s;
  }
  .search input:focus {
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.12);
    outline: none;
  }

  /* ===== 搜索结果 ===== */
  .search .search-results {
    margin-top: 4px;
  }
  .search .search-results .search-result {
    cursor: pointer;
    padding: 5px 8px;
    margin: 2px 0;
    border-radius: 6px;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
  }
  .search .search-results .search-result:hover {
    background: var(--sidebar-hover);
    border-left-color: var(--primary-light);
  }
  .search .search-results .search-result a {
    color: var(--primary-dark);
    font-weight: 600;
    text-decoration: none;
    display: block;
  }
  .search .search-results .search-result a:hover {
    color: var(--primary);
  }
  .search .search-results .search-result .search-keyword {
    color: var(--primary);
    background: rgba(108,92,231,0.08);
    padding: 0 3px;
    border-radius: 3px;
    font-weight: 600;
  }
  .search .search-results .search-result .search-result-content {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 2px;
    display: block;
  }

  /* ===== 主内容区 ===== */
  .content {
    padding-top: 30px;
  }
  .markdown-section {
    max-width: 900px;
    padding: 20px 40px 60px;
  }

  /* ===== 标题 ===== */
  .markdown-section h1 {
    font-size: 28px;
    font-weight: 800;
    color: var(--primary-dark);
    border-bottom: 2px solid var(--primary-light);
    padding-bottom: 12px;
    margin-bottom: 16px;
  }
  .markdown-section h1 + blockquote {
    margin-top: -8px;
  }
  .markdown-section h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
    padding: 12px 16px;
    margin: 28px 0 0 0;
    background: linear-gradient(135deg, rgba(108,92,231,0.06), rgba(162,155,254,0.04));
    border-radius: 10px 10px 0 0;
    border-left: 4px solid var(--primary);
  }
  .markdown-section h2 + p {
    margin-top: 0;
  }

  /* ===== 考点标签 ===== */
  .markdown-section h2 + p > strong:first-child:contains("考点") {
    display: inline-block;
  }
  .markdown-section ul:first-of-type {
    /* 考点-思路-关键代码-总结 列表 */
  }
  .markdown-section ul li {
    margin: 6px 0;
  }
  .markdown-section ul li strong:first-child {
    color: var(--primary-dark);
  }

  /* ===== 考点标签专用 ===== */
  .markdown-section h2 + p {
    margin: 8px 0 0 0;
    padding: 6px 16px;
    background: linear-gradient(135deg, rgba(253,121,168,0.06), rgba(253,121,168,0.02));
    border-radius: 0 0 10px 10px;
    border-left: 4px solid var(--accent);
  }

  /* ===== 代码块 ===== */
  .markdown-section pre {
    background: var(--code-bg);
    border-radius: 10px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .markdown-section code {
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
  }
  .markdown-section pre code {
    background: none;
  }
  .markdown-section p code, .markdown-section li code {
    background: var(--code-bg);
    color: #e17055;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12.5px;
  }

  /* ===== 分隔线 ===== */
  .markdown-section hr {
    border: none;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
    margin: 36px 0;
  }

  /* ===== 引用块 ===== */
  .markdown-section blockquote {
    border-left: 4px solid var(--primary-light);
    background: rgba(108,92,231,0.04);
    padding: 10px 16px;
    border-radius: 0 8px 8px 0;
    color: var(--text-light);
    font-size: 14px;
  }

  /* ===== 响应式 ===== */
  @media (max-width: 768px) {
    .sidebar {
      width: 260px;
    }
    .markdown-section {
      padding: 15px 20px 40px;
    }
    .markdown-section h1 {
      font-size: 22px;
    }
    .markdown-section h2 {
      font-size: 17px;
      padding: 10px 14px;
    }
  }

  /* ===== 按钮美化 ===== */
  .sidebar-toggle {
    background: var(--primary);
    color: #fff;
    border-radius: 0 6px 6px 0;
  }
  .sidebar-toggle:hover {
    background: var(--primary-dark);
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
window.$docsify = {
  name: '程序设计实践例题题解',
  repo: '',
  loadSidebar: true,
  subMaxLevel: 2,
  auto2top: true,
  search: {
    paths: 'auto',
    placeholder: '输入题目编号或名称搜索...',
    noData: '没有找到匹配的题目',
    depth: 2,
    hideOtherSidebarContent: false,
  },
  themeColor: '#6c5ce7',
  coverpage: false,
  logo: '',
  nameLink: '/',
  plugins: [
    function(hook, vm) {
      // 搜索结果点击跳转
      hook.doneEach(function() {
        var bindClick = function() {
          var items = document.querySelectorAll('.search-results .search-result');
          items.forEach(function(item) {
            if (item._clickBound) return;
            item._clickBound = true;
            item.addEventListener('click', function(e) {
              // 如果点击的是 <a> 本身，让它自然跳转
              if (e.target.tagName === 'A') return;
              var a = item.querySelector('a');
              if (a) {
                var href = a.getAttribute('href');
                if (href) {
                  e.preventDefault();
                  vm.route.change(href);
                }
              }
            });
          });
        };
        bindClick();
        // 搜索输入时也绑定新生成的条目
        var searchInput = document.querySelector('.search input');
        if (searchInput) {
          searchInput.addEventListener('input', function() {
            setTimeout(bindClick, 50);
          });
        }
      });
    }
  ]
};
</script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
