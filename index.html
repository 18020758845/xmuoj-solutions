<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>武林秘籍 · 程序设计实践题解集</title>
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>
  /* ===== 江湖主题 · 全局 ===== */
  :root {
    --red: #c0392b;
    --red-light: #e74c3c;
    --red-dark: #7b241c;
    --red-glow: rgba(192, 57, 43, 0.2);
    --amber: #d97706;
    --amber-light: #f59e0b;
    --green: #10b981;
    --green-light: #34d399;
    --green-dark: #065f46;
    --green-glow: rgba(16, 185, 129, 0.12);
    --bg: #0d1512;
    --card-bg: rgba(20, 35, 30, 0.75);
    --card-border: rgba(192, 57, 43, 0.12);
    --text: #e8e6d9;
    --text-light: #a8b0a5;
    --text-dim: #6b7568;
    --border: rgba(192, 57, 43, 0.15);
    --code-bg: rgba(12, 20, 18, 0.9);
    --sidebar-bg: rgba(10, 16, 13, 0.95);
    --sidebar-hover: rgba(192, 57, 43, 0.08);
    --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    background-image:
      radial-gradient(ellipse at 60% 0%, rgba(192, 57, 43, 0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(16, 185, 129, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 20% 50%, rgba(16, 185, 129, 0.03) 0%, transparent 50%);
  }

  /* ===== 侧边栏 ===== */
  .sidebar {
    background: var(--sidebar-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-right: 1px solid var(--border);
    width: 280px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(192, 57, 43, 0.3); border-radius: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }

  .sidebar-nav {
    padding: 0 0 20px 0;
  }
  .sidebar-nav li {
    margin: 1px 0;
    list-style: none;
  }
  .sidebar-nav a {
    display: block;
    padding: 7px 20px 7px 24px;
    font-size: 13.5px;
    color: var(--text-light);
    border-left: 3px solid transparent;
    transition: all 0.25s ease;
    text-decoration: none;
    line-height: 1.6;
  }
  .sidebar-nav a:hover {
    background: var(--sidebar-hover);
    border-left-color: var(--red);
    color: var(--red-light);
  }
  .sidebar-nav a.active {
    background: var(--sidebar-hover);
    border-left-color: var(--red);
    color: var(--red-light);
    font-weight: 700;
  }

  .sidebar > h1 {
    margin: 0;
    padding: 20px 20px 12px;
    font-family: "Songti SC", "SimSun", "Noto Serif CJK SC", "Noto Serif SC", "KaiTi", serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--red-light);
    border-bottom: 1px solid var(--border);
    letter-spacing: 2px;
  }
  .sidebar > h1 a {
    color: var(--red-light);
    text-decoration: none;
  }
  .sidebar > h1 a:hover {
    color: var(--amber-light);
  }

  /* ===== 搜索框 ===== */
  .search {
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
  }
  .search input {
    border: 1px solid rgba(192, 57, 43, 0.2);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 13px;
    background: rgba(192, 57, 43, 0.06);
    color: var(--text);
    transition: all 0.3s;
  }
  .search input::placeholder {
    color: var(--text-dim);
  }
  .search input:focus {
    border-color: rgba(192, 57, 43, 0.5);
    box-shadow: 0 0 0 3px var(--red-glow);
    outline: none;
    background: rgba(192, 57, 43, 0.1);
  }

  /* ===== 搜索结果 ===== */
  .search .results-panel {
    margin-top: 4px;
  }
  .search .results-panel .matching-post {
    cursor: pointer;
    padding: 6px 10px;
    margin: 2px 0;
    border-radius: 6px;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
  }
  .search .results-panel .matching-post:hover {
    background: var(--sidebar-hover);
    border-left-color: var(--red);
  }
  .search .results-panel .matching-post a {
    color: var(--text);
    font-weight: 600;
    text-decoration: none;
    display: block;
  }
  .search .results-panel .matching-post a:hover {
    color: var(--red-light);
  }
  .search .results-panel .matching-post em.search-keyword {
    color: var(--amber-light);
    background: rgba(217, 119, 6, 0.15);
    padding: 0 3px;
    border-radius: 2px;
    font-weight: 600;
    font-style: normal;
  }

  /* ===== 主内容区 ===== */
  .content {
    padding-top: 30px;
  }
  .markdown-section {
    max-width: 900px;
    padding: 24px 40px 60px;
  }

  /* ===== 标题 ===== */
  .markdown-section h1 {
    font-family: "Songti SC", "SimSun", "Noto Serif CJK SC", "Noto Serif SC", "KaiTi", serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--red-light);
    padding: 24px 32px;
    margin-bottom: 20px;
    background: rgba(192, 57, 43, 0.06);
    border: 1px solid rgba(192, 57, 43, 0.12);
    border-radius: 16px;
    letter-spacing: 3px;
    text-shadow: 0 0 40px rgba(192, 57, 43, 0.2);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }
  .markdown-section h1 + blockquote {
    margin-top: 0;
  }
  .markdown-section h2 {
    font-family: "Songti SC", "SimSun", "Noto Serif CJK SC", "Noto Serif SC", "KaiTi", serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--red-light);
    padding: 14px 20px;
    margin: 32px 0 0 0;
    background: linear-gradient(135deg, rgba(192, 57, 43, 0.08), rgba(192, 57, 43, 0.02));
    border-radius: 12px 12px 0 0;
    border-left: 4px solid var(--red);
    letter-spacing: 1.5px;
  }
  .markdown-section h2 + p {
    margin-top: 0;
  }

  /* ===== 列表 ===== */
  .markdown-section ul li {
    margin: 6px 0;
    color: var(--text);
  }
  .markdown-section ul li strong:first-child {
    color: var(--amber-light);
  }

  /* ===== 考点标签专用 ===== */
  .markdown-section h2 + p {
    margin: 8px 0 0 0;
    padding: 8px 20px;
    background: linear-gradient(135deg, rgba(16, 185, 129, 0.08), rgba(16, 185, 129, 0.02));
    border-radius: 0 0 12px 12px;
    border-left: 4px solid var(--green);
    color: var(--text-light);
  }

  /* ===== 代码块 ===== */
  .markdown-section pre {
    background: var(--code-bg);
    border-radius: 12px;
    padding: 18px 22px;
    border: 1px solid rgba(16, 185, 129, 0.12);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .markdown-section code {
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
    color: #d4cfc0;
  }
  .markdown-section pre code {
    background: none;
    color: #d4cfc0;
  }
  .markdown-section p code, .markdown-section li code {
    background: rgba(16, 185, 129, 0.08);
    color: var(--green-light);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12.5px;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  /* ===== 分隔线 ===== */
  .markdown-section hr {
    border: none;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(192, 57, 43, 0.3), rgba(16, 185, 129, 0.3), transparent);
    margin: 40px 0;
  }

  /* ===== 引用块 ===== */
  .markdown-section blockquote {
    border-left: 4px solid var(--red);
    background: rgba(192, 57, 43, 0.05);
    padding: 12px 20px;
    border-radius: 0 10px 10px 0;
    color: var(--text-light);
    font-size: 14px;
    margin: 16px 0;
  }

  /* ===== 图片 ===== */
  .markdown-section img {
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }

  /* ===== 链接 ===== */
  .markdown-section a {
    color: var(--green-light);
    text-decoration: none;
    transition: color 0.2s;
  }
  .markdown-section a:hover {
    color: var(--amber-light);
  }

  /* ===== 响应式 ===== */
  @media (max-width: 768px) {
    .sidebar {
      width: 260px;
    }
    .markdown-section {
      padding: 15px 20px 40px;
    }
    .markdown-section h1 {
      font-size: 22px;
      padding: 16px 20px;
    }
    .markdown-section h2 {
      font-size: 17px;
      padding: 10px 14px;
    }
  }

  /* ===== 侧边栏切换按钮 ===== */
  .sidebar-toggle {
    background: var(--red);
    color: #fff;
    border-radius: 0 6px 6px 0;
  }
  .sidebar-toggle:hover {
    background: var(--red-dark);
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
window.$docsify = {
  name: '⚔ 武林秘籍 · 题解集',
  repo: '',
  loadSidebar: true,
  subMaxLevel: 2,
  auto2top: true,
  search: 'auto',
  themeColor: '#c41e3a',
  coverpage: false,
  logo: '',
  nameLink: '/',
  plugins: [
    function(hook, vm) {
      // 存储题目索引
      var problemIndex = [];
      var searchTimeout = null;

      function buildIndex() {
        problemIndex = [];
        var headings = document.querySelectorAll('.markdown-section h2[id]');
        headings.forEach(function(h2) {
          if (!h2.id) return;
          var title = h2.textContent.trim();
          // 获取考点和思路摘要
          var summary = '';
          var el = h2.nextElementSibling;
          while (el && el.tagName !== 'H2') {
            summary += el.textContent.replace(/\s+/g, ' ').trim() + ' ';
            el = el.nextElementSibling;
          }
          summary = summary.substring(0, 120);
          problemIndex.push({ id: h2.id, title: title, summary: summary });
        });
      }

      function highlightText(text, query) {
        var re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        return text.replace(re, '<em class="search-keyword">$1</em>');
      }

      function doSearch(query) {
        var panel = document.querySelector('.results-panel');
        if (!panel) return;
        var q = query.trim().toLowerCase();
        if (!q) {
          panel.classList.remove('show');
          panel.innerHTML = '';
          return;
        }
        panel.classList.add('show');
        var matches = problemIndex.filter(function(item) {
          return item.title.toLowerCase().includes(q) ||
                 item.summary.toLowerCase().includes(q);
        });
        if (matches.length === 0) {
          panel.innerHTML = '<div class="matching-post" style="padding:8px;color:var(--text-light);font-size:13px;">没有找到匹配的题目</div>';
          return;
        }
        panel.innerHTML = matches.map(function(item) {
          var hlTitle = highlightText(item.title, q);
          var hlSummary = highlightText(item.summary, q);
          return '<div class="matching-post" data-link="' + item.id + '">' +
            '<a href="#/README?id=' + item.id + '">' +
            hlTitle +
            '<p style="font-size:12px;color:var(--text-light);margin:2px 0 0;font-weight:normal;">' +
            hlSummary.substring(0, 100) + '</p>' +
            '</a>' +
            '</div>';
        }).join('');
        // 绑定点击跳转：点击整个条目区域触发跳转
        panel.querySelectorAll('.matching-post').forEach(function(post) {
          post.addEventListener('click', function(e) {
            if (e.target.tagName === 'A') return;
            var link = post.querySelector('a');
            if (link) {
              var href = link.getAttribute('href');
              if (href) {
                window.location.hash = href.replace(/^.*#/, '#');
              }
            }
          });
        });
      }

      // 每次页面渲染完后重建索引，绑定搜索输入
      hook.doneEach(function() {
        buildIndex();
        var input = document.querySelector('.search input');
        if (input) {
          // 移除旧监听器（用新函数替换）
          var handler = input._searchHandler;
          if (handler) input.removeEventListener('input', handler);
          var newHandler = function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() {
              doSearch(input.value);
            }, 150);
          };
          input._searchHandler = newHandler;
          input.addEventListener('input', newHandler);
          // 如果已经有值，触发搜索
          if (input.value) doSearch(input.value);
        }
      });
    }
  ]
};
</script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
