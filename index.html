<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>光遇 · 题解集</title>
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>
  /* ===== 光遇 · 治愈老游戏风 ===== */
  :root {
    --gold: #c8964a;
    --gold-light: #e8c87a;
    --gold-dark: #8a5a28;
    --sky: #8fbfe0;
    --sky-light: #b8d8f0;
    --sky-dark: #5a8ab0;
    --bg: #fef8ec;
    --card-bg: #fffef8;
    --text: #4a3728;
    --text-light: #8a7a68;
    --text-muted: #b0a090;
    --border: #e8dcc8;
    --code-bg: #fef5e4;
    --sidebar-bg: #fffef8;
    --sidebar-hover: #fef3d8;
    --shadow: 0 2px 12px rgba(140, 100, 50, 0.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(200, 150, 74, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(143, 191, 224, 0.06) 0%, transparent 50%);
  }

  /* ===== 侧边栏 ===== */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    width: 280px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .sidebar-nav {
    padding: 0 0 20px 0;
  }
  .sidebar-nav li {
    margin: 0;
    list-style: none;
  }
  .sidebar-nav a {
    display: block;
    padding: 7px 20px 7px 24px;
    font-size: 13.5px;
    color: var(--text-light);
    border-left: 3px solid transparent;
    transition: all 0.2s ease;
    text-decoration: none;
    line-height: 1.6;
  }
  .sidebar-nav a:hover {
    background: var(--sidebar-hover);
    border-left-color: var(--gold-light);
    color: var(--gold-dark);
  }
  .sidebar-nav a.active {
    background: var(--sidebar-hover);
    border-left-color: var(--gold);
    color: var(--gold-dark);
    font-weight: 600;
  }

  .sidebar > h1 {
    margin: 0;
    padding: 20px 20px 12px;
    font-size: 17px;
    font-weight: 700;
    color: var(--gold-dark);
    border-bottom: 1px solid var(--border);
  }
  .sidebar > h1 a {
    color: var(--gold-dark);
    text-decoration: none;
  }
  .sidebar > h1 a:hover {
    color: var(--gold);
  }

  /* ===== 搜索框 ===== */
  .search {
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }
  .search input {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    transition: all 0.2s;
  }
  .search input:focus {
    border-color: var(--gold-light);
    box-shadow: 0 0 0 3px rgba(200, 150, 74, 0.12);
    outline: none;
  }

  /* ===== 搜索结果 ===== */
  .search .results-panel {
    margin-top: 4px;
  }
  .search .results-panel .matching-post {
    cursor: pointer;
    padding: 5px 8px;
    margin: 2px 0;
    border-radius: 6px;
    transition: all 0.2s ease;
    border-left: 3px solid transparent;
  }
  .search .results-panel .matching-post:hover {
    background: var(--sidebar-hover);
    border-left-color: var(--gold-light);
  }
  .search .results-panel .matching-post a {
    color: var(--gold-dark);
    font-weight: 600;
    text-decoration: none;
    display: block;
  }
  .search .results-panel .matching-post a:hover {
    color: var(--gold);
  }
  .search .results-panel .matching-post em.search-keyword {
    color: var(--gold);
    background: rgba(200,150,74,0.12);
    padding: 0 3px;
    border-radius: 3px;
    font-weight: 600;
    font-style: normal;
  }

  /* ===== 主内容区 ===== */
  .content {
    padding-top: 30px;
  }
  .markdown-section {
    max-width: 900px;
    padding: 20px 40px 60px;
  }

  /* ===== 标题 ===== */
  .markdown-section h1 {
    font-size: 28px;
    font-weight: 800;
    color: var(--gold-dark);
    border-bottom: 2px solid var(--gold-light);
    padding-bottom: 12px;
    margin-bottom: 16px;
  }
  .markdown-section h1 + blockquote {
    margin-top: -8px;
  }
  .markdown-section h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold-dark);
    padding: 12px 16px;
    margin: 28px 0 0 0;
    background: linear-gradient(135deg, rgba(200,150,74,0.08), rgba(232,200,122,0.04));
    border-radius: 10px 10px 0 0;
    border-left: 4px solid var(--gold);
  }
  .markdown-section h2 + p {
    margin-top: 0;
  }

  .markdown-section ul li {
    margin: 6px 0;
  }
  .markdown-section ul li strong:first-child {
    color: var(--gold-dark);
  }

  /* ===== 考点标签专用 ===== */
  .markdown-section h2 + p {
    margin: 8px 0 0 0;
    padding: 6px 16px;
    background: linear-gradient(135deg, rgba(143,191,224,0.1), rgba(184,216,240,0.05));
    border-radius: 0 0 10px 10px;
    border-left: 4px solid var(--sky);
  }

  /* ===== 代码块 ===== */
  .markdown-section pre {
    background: var(--code-bg);
    border-radius: 10px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .markdown-section code {
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
  }
  .markdown-section pre code {
    background: none;
  }
  .markdown-section p code, .markdown-section li code {
    background: var(--code-bg);
    color: #c87830;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12.5px;
  }

  /* ===== 分隔线 ===== */
  .markdown-section hr {
    border: none;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), var(--gold-light), var(--border), transparent);
    margin: 36px 0;
  }

  /* ===== 引用块 ===== */
  .markdown-section blockquote {
    border-left: 4px solid var(--gold-light);
    background: rgba(200,150,74,0.06);
    padding: 10px 16px;
    border-radius: 0 8px 8px 0;
    color: var(--text-light);
    font-size: 14px;
  }

  /* ===== 响应式 ===== */
  @media (max-width: 768px) {
    .sidebar {
      width: 260px;
    }
    .markdown-section {
      padding: 15px 20px 40px;
    }
    .markdown-section h1 {
      font-size: 22px;
    }
    .markdown-section h2 {
      font-size: 17px;
      padding: 10px 14px;
    }
  }

  /* ===== 按钮美化 ===== */
  .sidebar-toggle {
    background: var(--gold);
    color: #fff;
    border-radius: 0 6px 6px 0;
  }
  .sidebar-toggle:hover {
    background: var(--gold-dark);
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
window.$docsify = {
  name: '程序设计实践例题题解',
  repo: '',
  loadSidebar: true,
  subMaxLevel: 2,
  auto2top: true,
  search: 'auto',
  themeColor: '#c8964a',
  coverpage: false,
  logo: '',
  nameLink: '/',
  plugins: [
    function(hook, vm) {
      // 存储题目索引
      var problemIndex = [];
      var searchTimeout = null;

      function buildIndex() {
        problemIndex = [];
        var headings = document.querySelectorAll('.markdown-section h2[id]');
        headings.forEach(function(h2) {
          if (!h2.id) return;
          var title = h2.textContent.trim();
          // 获取考点和思路摘要
          var summary = '';
          var el = h2.nextElementSibling;
          while (el && el.tagName !== 'H2') {
            summary += el.textContent.replace(/\s+/g, ' ').trim() + ' ';
            el = el.nextElementSibling;
          }
          summary = summary.substring(0, 120);
          problemIndex.push({ id: h2.id, title: title, summary: summary });
        });
      }

      function highlightText(text, query) {
        var re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        return text.replace(re, '<em class="search-keyword">$1</em>');
      }

      function doSearch(query) {
        var panel = document.querySelector('.results-panel');
        if (!panel) return;
        var q = query.trim().toLowerCase();
        if (!q) {
          panel.classList.remove('show');
          panel.innerHTML = '';
          return;
        }
        panel.classList.add('show');
        var matches = problemIndex.filter(function(item) {
          return item.title.toLowerCase().includes(q) ||
                 item.summary.toLowerCase().includes(q);
        });
        if (matches.length === 0) {
          panel.innerHTML = '<div class="matching-post" style="padding:8px;color:var(--text-light);font-size:13px;">没有找到匹配的题目</div>';
          return;
        }
        panel.innerHTML = matches.map(function(item) {
          var hlTitle = highlightText(item.title, q);
          var hlSummary = highlightText(item.summary, q);
          return '<div class="matching-post" data-link="' + item.id + '">' +
            '<a href="#/README?id=' + item.id + '">' +
            hlTitle +
            '<p style="font-size:12px;color:var(--text-light);margin:2px 0 0;font-weight:normal;">' +
            hlSummary.substring(0, 100) + '</p>' +
            '</a>' +
            '</div>';
        }).join('');
        // 绑定点击跳转：点击整个条目区域触发跳转
        panel.querySelectorAll('.matching-post').forEach(function(post) {
          post.addEventListener('click', function(e) {
            if (e.target.tagName === 'A') return;
            var link = post.querySelector('a');
            if (link) {
              var href = link.getAttribute('href');
              if (href) {
                window.location.hash = href.replace(/^.*#/, '#');
              }
            }
          });
        });
      }

      // 每次页面渲染完后重建索引，绑定搜索输入
      hook.doneEach(function() {
        buildIndex();
        var input = document.querySelector('.search input');
        if (input) {
          // 移除旧监听器（用新函数替换）
          var handler = input._searchHandler;
          if (handler) input.removeEventListener('input', handler);
          var newHandler = function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() {
              doSearch(input.value);
            }, 150);
          };
          input._searchHandler = newHandler;
          input.addEventListener('input', newHandler);
          // 如果已经有值，触发搜索
          if (input.value) doSearch(input.value);
        }
      });
    }
  ]
};
</script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
