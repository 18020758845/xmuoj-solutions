<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>深蓝海域 · 题解集</title>
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
<style>
  /* ===== 深海浮世绘风 · 冷暖交融 ===== */
  :root {
    --blue-deep: #1a303a;
    --blue-mid: #243e4a;
    --blue-light: #3a5a6a;
    --sand: #d4a574;
    --sand-light: #e8c4a8;
    --warm-white: #f0e8db;
    --text: #f5f0e8;
    --text-secondary: #d0ccc4;
    --text-muted: #9a9488;
    --card-bg: rgba(22, 40, 50, 0.95);
    --code-bg: rgba(16, 28, 35, 0.96);
    --code-text: #e8e0d0;
    --sidebar-bg: rgba(18, 34, 42, 0.97);
    --sidebar-hover: rgba(212, 165, 116, 0.15);
    --border: rgba(212, 165, 116, 0.2);
    --accent: #d4a574;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #ffffff;
    background: url('images/bg-ocean.jpg') no-repeat center top fixed;
    background-size: cover;
    min-height: 100vh;
  }

  /* ===== 侧边栏 ===== */
  .sidebar {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    width: 280px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--blue-light); border-radius: 4px; }

  .sidebar-nav {
    padding: 0 0 20px 0;
  }
  .sidebar-nav li {
    margin: 1px 0;
    list-style: none;
  }
  .sidebar-nav a {
    display: block;
    padding: 8px 20px 8px 24px;
    font-size: 13.5px;
    color: #ffffff;
    border-left: 3px solid transparent;
    transition: all 0.2s ease;
    text-decoration: none;
    line-height: 1.6;
  }
  .sidebar-nav a:hover {
    background: var(--sidebar-hover);
    border-left-color: var(--sand);
    color: #ffffff;
  }
  .sidebar-nav a.active {
    background: var(--sidebar-hover);
    border-left-color: var(--sand);
    color: #ffffff;
    font-weight: 700;
  }

  .sidebar > h1 {
    margin: 0;
    padding: 20px 20px 12px;
    font-size: 17px;
    font-weight: 700;
    color: #ffffff;
    border-bottom: 1px solid var(--border);
  }
  .sidebar > h1 a {
    color: #ffffff;
    text-decoration: none;
  }
  .sidebar > h1 a:hover {
    color: #ffffff;
  }

  /* ===== 搜索框 ===== */
  .search {
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }
  .search input {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    background: rgba(20, 35, 40, 0.6);
    color: var(--warm-white);
    transition: all 0.2s;
  }
  .search input::placeholder {
    color: #ffffff;
    opacity: 0.5;
  }
  .search input:focus {
    border-color: var(--sand);
    box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.15);
    outline: none;
  }

  /* ===== 搜索结果 ===== */
  .search .results-panel {
    margin-top: 4px;
  }
  .search .results-panel .matching-post {
    cursor: pointer;
    padding: 6px 10px;
    margin: 2px 0;
    border-radius: 6px;
    transition: all 0.15s ease;
    border-left: 3px solid transparent;
  }
  .search .results-panel .matching-post:hover {
    background: var(--sidebar-hover);
    border-left-color: var(--sand);
  }
  .search .results-panel .matching-post a {
    color: #ffffff;
    font-weight: 600;
    text-decoration: none;
    display: block;
  }
  .search .results-panel .matching-post a:hover {
    color: #ffffff;
  }
  .search .results-panel .matching-post em.search-keyword {
    color: var(--sand-light);
    background: rgba(212, 165, 116, 0.2);
    padding: 0 3px;
    border-radius: 3px;
    font-weight: 600;
    font-style: normal;
  }

  /* ===== 主内容区 ===== */
  .content {
    padding-top: 30px;
  }
  .markdown-section {
    max-width: 900px;
    padding: 20px 40px 60px;
    background: rgba(60, 135, 185, 0.08);
    border-radius: 16px;
  }

  /* ===== h1 主标题 ===== */
  .markdown-section h1 {
    font-size: 28px;
    font-weight: 800;
    color: #ffffff;
    padding: 20px 28px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-left: 4px solid var(--sand);
    margin-bottom: 20px;
  }
  .markdown-section h1 + blockquote {
    margin-top: 0;
  }

  /* ===== h2 题目标题 ===== */
  .markdown-section h2 {
    font-size: 20px;
    font-weight: 700;
    color: #ffffff;
    padding: 14px 18px;
    margin: 32px 0 0 0;
    background: var(--card-bg);
    border-radius: 10px 10px 0 0;
    border-left: 4px solid var(--sand);
  }
  .markdown-section h2 + p {
    margin-top: 0;
  }

  .markdown-section ul li {
    margin: 6px 0;
    color: #ffffff;
  }
  .markdown-section ul li strong:first-child {
    color: #ffffff;
  }

  /* ===== 考点标签专用 ===== */
  .markdown-section h2 + p {
    margin: 8px 0 0 0;
    padding: 8px 18px;
    background: rgba(60, 135, 185, 0.15);
    border-radius: 0 0 10px 10px;
    border-left: 4px solid var(--sand-light);
    color: #ffffff;
  }

  /* ===== h2下方的列表（思路/关键代码/总结） ===== */
  .markdown-section h2 + p + ul {
    margin: 0;
    padding: 10px 18px 12px 36px;
    background: rgba(60, 135, 185, 0.12);
    border-radius: 0 0 10px 10px;
    color: #ffffff;
  }
  .markdown-section h2 + p + ul li {
    color: #ffffff;
  }
  .markdown-section h2 + p + ul li strong:first-child {
    color: #ffffff;
  }

  /* ===== 代码块 ===== */
  .markdown-section pre {
    background: var(--code-bg);
    border-radius: 10px;
    padding: 18px 22px;
    border: 1px solid var(--border);
    color: var(--code-text);
  }
  .markdown-section code {
    font-family: "JetBrains Mono", "Fira Code", "Consolas", monospace;
    font-size: 13px;
  }
  .markdown-section pre code {
    background: none;
    color: var(--code-text);
  }
  .markdown-section p code, .markdown-section li code {
    background: var(--code-bg);
    color: var(--sand-light);
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 12.5px;
  }

  /* ===== 分隔线 ===== */
  .markdown-section hr {
    border: none;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), var(--sand), var(--border), transparent);
    margin: 40px 0;
  }

  /* ===== 引用块 ===== */
  .markdown-section blockquote {
    border-left: 4px solid var(--sand);
    background: var(--card-bg);
    padding: 12px 18px;
    border-radius: 0 10px 10px 0;
    color: #ffffff;
    font-size: 14px;
  }

  /* ===== 图片 ===== */
  .markdown-section img {
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  /* ===== 链接 ===== */
  .markdown-section a {
    color: var(--sand-light);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.15s;
  }
  .markdown-section a:hover {
    color: var(--warm-white);
  }

  /* ===== 表格 ===== */
  .markdown-section table {
    border-collapse: separate;
    border-spacing: 0;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .markdown-section th {
    background: var(--blue-mid);
    color: var(--sand-light);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
  }
  .markdown-section td {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--card-bg);
    color: #ffffff;
  }
  .markdown-section tr:last-child td {
    border-bottom: none;
  }

  /* ===== 响应式 ===== */
  @media (max-width: 768px) {
    .sidebar {
      width: 260px;
    }
    .markdown-section {
      padding: 15px 20px 40px;
    }
    .markdown-section h1 {
      font-size: 22px;
      padding: 14px 18px;
    }
    .markdown-section h2 {
      font-size: 17px;
      padding: 10px 14px;
    }
  }

  /* ===== 按钮美化 ===== */
  .sidebar-toggle {
    background: var(--sand);
    color: #1a303a;
    border-radius: 0 8px 8px 0;
  }
  .sidebar-toggle:hover {
    background: var(--sand-light);
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
window.$docsify = {
  name: '程序设计实践例题题解',
  repo: '',
  loadSidebar: true,
  subMaxLevel: 2,
  auto2top: true,
  search: 'auto',
  themeColor: '#d4a574',
  coverpage: false,
  logo: '',
  nameLink: '/',
  plugins: [
    function(hook, vm) {
      // 存储题目索引
      var problemIndex = [];
      var searchTimeout = null;

      function buildIndex() {
        problemIndex = [];
        var headings = document.querySelectorAll('.markdown-section h2[id]');
        headings.forEach(function(h2) {
          if (!h2.id) return;
          var title = h2.textContent.trim();
          // 获取考点和思路摘要
          var summary = '';
          var el = h2.nextElementSibling;
          while (el && el.tagName !== 'H2') {
            summary += el.textContent.replace(/\s+/g, ' ').trim() + ' ';
            el = el.nextElementSibling;
          }
          summary = summary.substring(0, 120);
          problemIndex.push({ id: h2.id, title: title, summary: summary });
        });
      }

      function highlightText(text, query) {
        var re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        return text.replace(re, '<em class="search-keyword">$1</em>');
      }

      function doSearch(query) {
        var panel = document.querySelector('.results-panel');
        if (!panel) return;
        var q = query.trim().toLowerCase();
        if (!q) {
          panel.classList.remove('show');
          panel.innerHTML = '';
          return;
        }
        panel.classList.add('show');
        var matches = problemIndex.filter(function(item) {
          return item.title.toLowerCase().includes(q) ||
                 item.summary.toLowerCase().includes(q);
        });
        if (matches.length === 0) {
          panel.innerHTML = '<div class="matching-post" style="padding:8px;color:#ffffff;font-size:13px;">没有找到匹配的题目</div>';
          return;
        }
        panel.innerHTML = matches.map(function(item) {
          var hlTitle = highlightText(item.title, q);
          var hlSummary = highlightText(item.summary, q);
          return '<div class="matching-post" data-link="' + item.id + '">' +
            '<a href="#/README?id=' + item.id + '">' +
            hlTitle +
            '<p style="font-size:12px;color:#ffffff;margin:2px 0 0;font-weight:normal;">' +
            hlSummary.substring(0, 100) + '</p>' +
            '</a>' +
            '</div>';
        }).join('');
        // 绑定点击跳转：点击整个条目区域触发跳转
        panel.querySelectorAll('.matching-post').forEach(function(post) {
          post.addEventListener('click', function(e) {
            if (e.target.tagName === 'A') return;
            var link = post.querySelector('a');
            if (link) {
              var href = link.getAttribute('href');
              if (href) {
                window.location.hash = href.replace(/^.*#/, '#');
              }
            }
          });
        });
      }

      // 每次页面渲染完后重建索引，绑定搜索输入
      hook.doneEach(function() {
        buildIndex();
        var input = document.querySelector('.search input');
        if (input) {
          // 移除旧监听器（用新函数替换）
          var handler = input._searchHandler;
          if (handler) input.removeEventListener('input', handler);
          var newHandler = function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() {
              doSearch(input.value);
            }, 150);
          };
          input._searchHandler = newHandler;
          input.addEventListener('input', newHandler);
          // 如果已经有值，触发搜索
          if (input.value) doSearch(input.value);
        }
      });
    }
  ]
};
</script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
